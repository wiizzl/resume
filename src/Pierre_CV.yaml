        details: "[C1](https://cert.efset.org/fr/BwATyb)"
      - label: Allemand
        details: A2
      - label: Sport
        details: Musculation, Volleyball

design:
  theme: opal

  page:
    size: a4
    top_margin: 0.3in
    bottom_margin: 0.3in
    left_margin: 0.3in
    right_margin: 0.3in
    show_footer: false
    show_top_note: true

  colors:
    body: rgb(0, 0, 0)
    name: rgb(0, 100, 90)
    headline: rgb(0, 80, 72)
    connections: rgb(0, 80, 72)
    section_titles: rgb(0, 100, 90)
    links: rgb(0, 100, 90)
    footer: rgb(100, 140, 135)
    top_note: rgb(100, 140, 135)

  typography:
    line_spacing: 0.5em
    alignment: left
    date_and_location_column_alignment: right
    font_family:
      body: Lato
      name: Lato
      headline: Lato
      connections: Lato
      section_titles: Lato
    font_size:
      body: 10pt
      name: 18pt
      headline: 12pt
      connections: 10pt
      section_titles: 12pt
    small_caps:
      name: false
      headline: false
      connections: false
      section_titles: false
    bold:
      name: false
      headline: true
      connections: false
      section_titles: true

  links:
    underline: false
    show_external_link_icon: true

  header:
    alignment: left
    photo_width: 3cm
    photo_position: right
    photo_space_left: 0.4cm
    photo_space_right: 0cm
    space_below_name: 0.2cm
    space_below_headline: 0.4cm
    space_below_connections: 0.4cm
    connections:
      phone_number_format: national
      hyperlink: true
      show_icons: true
      display_urls_instead_of_usernames: false
      separator: •
      space_between_connections: 0.75cm

  section_titles:
    type: with_partial_line
    line_thickness: 0.5pt
    space_above: 0.5cm
    space_below: 0.3cm

  sections:
    allow_page_break: true
    space_between_regular_entries: 0.8em
    space_between_text_based_entries: 0.25em
    show_time_spans_in: []

  entries:
    date_and_location_width: 3cm
    side_space: 0.1cm
    space_between_columns: 0cm
    allow_page_break: false
    short_second_row: true
    degree_width: 1cm
    summary:
      space_above: 0.04cm
      space_left: 0cm
    highlights:
      bullet: ◦
      nested_bullet: ◦
      space_left: 0.15cm
      space_above: 0.04cm
      space_between_items: 0.04cm
      space_between_bullet_and_text: 0.5em

  templates:
    footer: "*NAME -- PAGE_NUMBER/TOTAL_PAGES*"
    top_note: "*LAST_UPDATED MONTH_NAME YEAR*"
    single_date: MONTH_ABBREVIATION YEAR_IN_TWO_DIGITS
    date_range: START_DATE – END_DATE
    time_span: HOW_MANY_YEARS YEARS HOW_MANY_MONTHS MONTHS
    one_line_entry:
      main_column: "LABEL : *DETAILS*"
    education_entry:
      main_column: |-
        INSTITUTION -- DEGREE (AREA)
        *SUMMARY*
        HIGHLIGHTS
      degree_column:
      date_and_location_column: |-
        LOCATION
        DATE
    normal_entry:
      main_column: |-
        NAME -- *TECHNOLOGIES*
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: DATE
    experience_entry:
      main_column: |-
        COMPANY -- POSITION
        *TECHNOLOGIES*
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: |-
        LOCATION
        DATE

locale:
  language: french
  last_updated: Mis à jour en
  month: mois
  months: mois
  year: an
  years: ans
  present: Présent
  month_abbreviations:
    - Jan
    - Fév
    - Mar
    - Avr
    - Mai
    - Juin
    - Juil
    - Août
    - Sep
    - Oct
    - Nov
    - Déc
  month_names:
    - Janvier
    - Février
    - Mars
    - Avril
    - Mai
    - Juin
    - Juillet
    - Août
    - Septembre
    - Octobre
    - Novembre
    - Décembre

settings:
  current_date: today
  render_command:
    output_folder: rendercv_output
    design:
    locale:
    typst_path: OUTPUT_FOLDER/NAME_IN_SNAKE_CASE_CV.typ
    pdf_path: OUTPUT_FOLDER/NAME_IN_SNAKE_CASE_CV.pdf
    markdown_path: OUTPUT_FOLDER/NAME_IN_SNAKE_CASE_CV.md
    html_path: OUTPUT_FOLDER/NAME_IN_SNAKE_CASE_CV.html
    png_path: OUTPUT_FOLDER/NAME_IN_SNAKE_CASE_CV.png
    dont_generate_markdown: true
    dont_generate_html: true
    dont_generate_typst: false
    dont_generate_pdf: false
    dont_generate_png: true
  bold_keywords: []
  pdf_title: CV - NAME
