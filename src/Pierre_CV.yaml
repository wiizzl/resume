cv:
  name: Pierre Houllière
  headline: En recherche d'alternance pour la rentrée 2026 — Développement logiciel / culture DevOps
  location: Rouen
  email: contact@houlliere.com
  phone: +33-06-11-77-62-00
  website: https://houlliere.com

  social_networks:
    - network: LinkedIn
      username: pierrehoulliere
    - network: GitHub
      username: wiizzl

  sections:
    expériences:
      - company: "[WorldSkills France](https://worldskills-france.org)"
        position: Compétiteur & Expert national adjoint
        start_date: 2024-11
        summary: De la compétition en développement web à l'encadrement des prochaines éditions.
        highlights:
          - Champion régional Normandie (Caen 2024).
          - Vice-champion de France (Marseille 2025).
          - Expert national adjoint (bénévole) depuis 2026 pour l'édition Orléans 2027.

      - company: "[Matmut](https://www.matmut.fr/groupe-matmut/qui-sommes-nous.html)"
        position: Développeur Web
        start_date: 2026-01
        end_date: 2026-02
        location: Rouen
        summary: Stage de deuxième année de BTS SIO.
        technologies: React (Tanstack Start), Playwright, Azure DevOps
        highlights:
          - Mise en place de l'environnement de tests E2E (régression visuelle, …) du design system.
          - Développement d'un système de statistiques des performances du design system.

      - company: "[FOLDING-ART](https://folding-art.fr) / [laine & maille](https://laine-maille.fr)"
        position: Développeur Full-stack
        start_date: 2024-07
        end_date: 2025-07
        location: À distance
        summary: Développement, déploiement et maintenance de sites e-commerce en tant que prestataire.
        technologies: React (Next.js), TailwindCSS

      - company: "[Overspeed](https://overspeed.fr)"
        position: Développeur Full-stack
        start_date: 2025-05
        end_date: 2025-08
        location: Rouen
        summary: Stage de première année de BTS SIO puis repris en tant que prestataire.
        technologies: React (Next.js), Golang (Gin), Docker
        highlights:
          - Développement d'un CMS pour que les clients puissent gérer le contenu de leurs bornes.

    compétences:
      - label: Langages
        details: TypeScript/JavaScript, Golang, C# (.NET), Python, PHP, SQL, HTML/CSS

      - label: Technologies Web
        details: React, Next.js, Écosystème Tanstack, Angular, TailwindCSS, Node.js, Bun, React Native, Tauri

      - label: Systèmes & DevOps
        details: GNU/Linux, CI/CD (GitHub Actions, GitLab CI/CD), Docker, GitOps (ArgoCD)

      - label: Bases de données
        details: PostgreSQL, MySQL/MariaDB, SQL Server, Redis, MongoDB

      - label: Modélisation & conception
        details: UML, Merise, Agile Scrum, Clean Code, Design Patterns

    projets:
      - name: "[secure_chat](https://github.com/wiizzl/secure-chat)"
        date: 2025-12
        summary: Canaux de discussions privés et temporaires en temps réel.
        technologies: React (Next.js), Redis, Elysia, Bun

      - name: "[CV dynamique](https://github.com/wiizzl/resume)"
        date: 2025-07
        summary: Génération de ce CV de manière dynamique via pipelines CI/CD.
        technologies: Python, GitHub Actions

      - name: "[B-Pump](https://github.com/B-Pump/bpump-app)"
        start_date: 2024-01
        end_date: 2024-05
        summary: Application mobile de contrôle d'un robot analysant les mouvements avec un modèle d'IA.
        technologies: React Native, Expo, Socket.IO, Mediapipe

    formations:
      - institution: "[Campus La Châtaigneraie](https://la-chataigneraie.org)"
        degree: BTS SIO
        area: Solutions Logicielles et Applications Métiers
        start_date: 2024
        end_date: 2026
        location: Le Mesnil-Esnard
        summary: Option maths. approfondies, Développement de l'application de vote du concours d'éloquence du campus, Création de TP pour le cours de Développement de services informatiques.

      - institution: "[Lycée Galilée](https://galilee.lycee.ac-normandie.fr)"
        degree: Baccalauréat général
        area: Maths. et Sciences de l'Ingénieur
        start_date: 2021
        end_date: 2024
        location: Franqueville-St-Pierre
        summary: Mention Bien, Lauréat des Olympiades de Sciences de l'Ingénieur 2024, Développement d'une plateforme de révisions pour les élèves de la spécialité S.I.

    langues:
      - label: Français
        details: Natif
      - label: Anglais
        details: B2+
      - label: Allemand
        details: A2

design:
  theme: opal

  page:
    size: a4
    top_margin: 0.4in
    bottom_margin: 0.4in
    left_margin: 0.4in
    right_margin: 0.4in
    show_footer: false
    show_top_note: true

  colors:
    body: rgb(0, 0, 0)
    name: rgb(0, 100, 90)
    headline: rgb(0, 80, 72)
    connections: rgb(0, 80, 72)
    section_titles: rgb(0, 100, 90)
    links: rgb(0, 100, 90)
    footer: rgb(100, 140, 135)
    top_note: rgb(100, 140, 135)

  typography:
    line_spacing: 0.6em
    alignment: left
    date_and_location_column_alignment: right
    font_family:
      body: Lato
      name: Lato
      headline: Lato
      connections: Lato
      section_titles: Lato
    font_size:
      body: 10pt
      name: 20pt
      headline: 10pt
      connections: 10pt
      section_titles: 11.5pt
    small_caps:
      name: false
      headline: false
      connections: false
      section_titles: false
    bold:
      name: false
      headline: false
      connections: false
      section_titles: true

  links:
    underline: false
    show_external_link_icon: true

  header:
    alignment: left
    photo_width: 3.5cm
    photo_position: left
    photo_space_left: 0.4cm
    photo_space_right: 0.4cm
    space_below_name: 0.25cm
    space_below_headline: 0.4cm
    space_below_connections: 0.5cm
    connections:
      phone_number_format: national
      hyperlink: true
      show_icons: true
      display_urls_instead_of_usernames: false
      separator: •
      space_between_connections: 0.6cm

  section_titles:
    type: with_partial_line
    line_thickness: 0.5pt
    space_above: 0.6cm
    space_below: 0.35cm

  sections:
    allow_page_break: true
    space_between_regular_entries: 0.8em
    space_between_text_based_entries: 0.3em
    show_time_spans_in: ["expériences"]

  entries:
    date_and_location_width: 4.15cm
    side_space: 0.1cm
    space_between_columns: 0.1cm
    allow_page_break: false
    short_second_row: true
    degree_width: 1cm
    summary:
      space_above: 0.04cm
      space_left: 0cm
    highlights:
      bullet: ◦
      nested_bullet: ◦
      space_left: 0.15cm
      space_above: 0.04cm
      space_between_items: 0.04cm
      space_between_bullet_and_text: 0.5em

  templates:
    footer: "*NAME -- PAGE_NUMBER/TOTAL_PAGES*"
    top_note: "*LAST_UPDATED MONTH_NAME YEAR*"
    single_date: MONTH_ABBREVIATION YEAR_IN_TWO_DIGITS
    date_range: START_DATE – END_DATE
    time_span: HOW_MANY_YEARS YEARS HOW_MANY_MONTHS MONTHS
    one_line_entry:
      main_column: "LABEL : *DETAILS*"
    education_entry:
      main_column: |-
        INSTITUTION -- DEGREE_WITH_AREA
        *SUMMARY*
        HIGHLIGHTS
      degree_column:
      date_and_location_column: |-
        LOCATION
        DATE
    normal_entry:
      main_column: |-
        NAME -- *TECHNOLOGIES*
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: DATE
    experience_entry:
      main_column: |-
        COMPANY -- POSITION
        *TECHNOLOGIES*
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: |-
        LOCATION
        DATE

locale:
  language: french
  last_updated: Mis à jour en
  month: mois
  months: mois
  year: an
  years: ans
  present: Présent
  phrases:
    degree_with_area: DEGREE (AREA)
  month_abbreviations:
    - Jan
    - Fév
    - Mar
    - Avr
    - Mai
    - Juin
    - Juil
    - Août
    - Sep
    - Oct
    - Nov
    - Déc
  month_names:
    - Janvier
    - Février
    - Mars
    - Avril
    - Mai
    - Juin
    - Juillet
    - Août
    - Septembre
    - Octobre
    - Novembre
    - Décembre

settings:
  current_date: today
  render_command:
    output_folder: rendercv_output
    design:
    locale:
    typst_path: OUTPUT_FOLDER/NAME_IN_SNAKE_CASE_CV.typ
    pdf_path: OUTPUT_FOLDER/NAME_IN_SNAKE_CASE_CV.pdf
    markdown_path: OUTPUT_FOLDER/NAME_IN_SNAKE_CASE_CV.md
    html_path: OUTPUT_FOLDER/NAME_IN_SNAKE_CASE_CV.html
    png_path: OUTPUT_FOLDER/NAME_IN_SNAKE_CASE_CV.png
    dont_generate_markdown: true
    dont_generate_html: true
    dont_generate_typst: false
    dont_generate_pdf: false
    dont_generate_png: true
  bold_keywords: []
  pdf_title: CV - NAME
